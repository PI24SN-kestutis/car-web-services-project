<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Car Client Demo</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2rem; }
        table { border-collapse: collapse; width: 100%; margin-top: 1rem; }
        th, td { border: 1px solid #ddd; padding: 8px; }
        th { background: #f5f5f5; text-align: left; }
        .error { color: #b00020; }
        .message { color: #0b6b2f; }
        .actions { display: flex; gap: 0.75rem; margin: 1rem 0; flex-wrap: wrap; }
        .note { margin-top: 0.25rem; color: #555; }
        .filters { display: flex; gap: 0.5rem; margin-top: 1rem; flex-wrap: wrap; align-items: center; }
        .filters input, .filters select { padding: 0.3rem; }
        .row-actions { display: flex; gap: 0.5rem; }
        .top-actions { margin-bottom: 0.75rem; }
    </style>
</head>
<body>
<!-- Pagrindinis demonstracinis puslapis: rodo automobilių sąrašą iš SOAP serverio. -->
<h1>Car Client (SOAP + XSL Demo)</h1>

<p>Server endpoint: <code>http://localhost:8080/services/cars?wsdl</code></p>

<div th:if="${message}" class="message" th:text="${message}"></div>
<div th:if="${error}" class="error" th:text="${error}"></div>

<div class="top-actions">
    <a th:href="@{/cars/new}">+ Naujas automobilis</a>
</div>

<form method="get" th:action="@{/}" class="filters" th:object="${filter}">
    <input type="text" th:field="*{q}" placeholder="Paieška pagal gamintoją/modelį"/>
    <select th:field="*{available}">
        <option value="">Prieinamumas: visi</option>
        <option value="true">Tik prieinami</option>
        <option value="false">Tik neprieinami</option>
    </select>
    <input type="number" step="0.01" min="0" th:field="*{minPrice}" placeholder="Min kaina"/>
    <input type="number" step="0.01" min="0" th:field="*{maxPrice}" placeholder="Max kaina"/>
    <button type="submit">Filtruoti</button>
    <a th:href="@{/}">Išvalyti</a>
</form>

<!-- Eksporto veiksmai: sugeneruoja XML, HTML arba PDF failą pagal duomenis. -->
<div class="actions">
    <form method="post" th:action="@{/export/xml}">
        <button type="submit">Sukurti XML</button>
    </form>
    <form method="post" th:action="@{/export/html}">
        <button type="submit">Sukurti HTML</button>
    </form>
    <form method="post" th:action="@{/export/pdf}">
        <button type="submit">Sukurti PDF</button>
    </form>
</div>
<p class="note">Pastaba: kuriant HTML arba PDF, pirmiausia reikalingas XML failas.</p>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Make</th>
        <th>Model</th>
        <th>Year</th>
        <th>Price</th>
        <th>Available</th>
        <th>Color Code</th>
        <th>Parts Count</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="car : ${cars}">
        <td th:text="${car.id}"></td>
        <td th:text="${car.make}"></td>
        <td th:text="${car.model}"></td>
        <td th:text="${car.year}"></td>
        <td th:text="${car.price}"></td>
        <td th:text="${car.available}"></td>
        <td th:text="${car.colorCode}"></td>
        <td th:text="${#lists.size(car.parts)}"></td>
        <td>
            <div class="row-actions">
                <a th:href="@{/cars/{id}/edit(id=${car.id})}">Redaguoti</a>
                <form method="post" th:action="@{/cars/{id}/delete(id=${car.id})}">
                    <button type="submit" onclick="return confirm('Ar tikrai šalinti automobilį?')">Šalinti</button>
                </form>
            </div>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
