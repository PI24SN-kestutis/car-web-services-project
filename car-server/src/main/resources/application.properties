# Programos pavadinimas
spring.application.name=carserver

# ===========================
# H2 duomenų bazės konfigūracija
# ===========================
# Duomenų bazė saugoma atmintyje (išsitrina paleidus serverį iš naujo)
spring.datasource.url=jdbc:h2:mem:cardb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===========================
# JPA / Hibernate konfigūracija
# ===========================
# create-drop: sukuria lenteles paleidžiant, ištrina baigiant
spring.jpa.hibernate.ddl-auto=create-drop
# Rodo SQL užklausas konsolėje (naudinga mokantis)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ===========================
# H2 interneto konsolė
# Adresas: http://localhost:8080/h2-console
# JDBC URL: jdbc:h2:mem:cardb
# ===========================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===========================
# Apache CXF – SOAP endpoint konfigūracija
# Visi SOAP servisai pasiekiami per /services/... adresą
# WSDL: http://localhost:8080/services/cars?wsdl
# ===========================
cxf.path=/services

# ===========================
# Serverio prievadas
# ===========================
server.port=8080
